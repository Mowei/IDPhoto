<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>證件照產生器 - ID Photo Generator</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>📷 證件照產生器</h1>
    </header>

    <div class="main-layout">
      <!-- 左側控制面板 -->
      <aside class="control-panel">
        <!-- 照片類型選擇 -->
        <section class="panel-section">
          <h2>照片類型</h2>
          <label class="radio-label">
            <input type="radio" name="photoType" value="oneInch" />
            1吋大頭貼 (2.8×3.5cm)
          </label>
          <label class="radio-label">
            <input type="radio" name="photoType" value="twoInchHead" checked />
            2吋大頭照 (3.5×4.5cm)
          </label>
          <label class="radio-label">
            <input type="radio" name="photoType" value="twoInchHalf" />
            2吋半身照 (4.2×4.7cm)
          </label>
          <label class="radio-label">
            <input type="radio" name="photoType" value="threeByFour" />
            3×4大頭照 (3.0×4.0cm)
          </label>
          <label class="radio-label">
            <input type="radio" name="photoType" value="fiveByFive" />
            5×5大頭照 (5.0×5.0cm)
          </label>
        </section>

        <!-- 照片匯入 -->
        <section class="panel-section">
          <h2>匯入照片</h2>
          <label class="file-upload-btn" for="fileInput">選擇照片</label>
          <input type="file" id="fileInput" accept="image/*" />
          <p class="file-name" id="fileName">尚未選擇檔案</p>
        </section>

        <!-- 美膚/打亮/亮度 -->
        <section class="panel-section" id="beautySection">
          <h2>影像調整</h2>
          <div class="slider-group">
            <label>簡易美膚</label>
            <input type="range" id="smoothSlider" min="0" max="10" value="0" step="1" />
            <span class="slider-value" id="smoothValue">0</span>
          </div>
          <div class="slider-group">
            <label>簡易打亮</label>
            <input type="range" id="brightenSlider" min="0" max="50" value="0" step="1" />
            <span class="slider-value" id="brightenValue">0</span>
          </div>
          <div class="slider-group">
            <label>亮度調整</label>
            <input type="range" id="brightnessSlider" min="80" max="150" value="100" step="1" />
            <span class="slider-value" id="brightnessValue">100%</span>
          </div>
          <button id="resetBeauty" class="btn btn-secondary">回復原狀</button>
        </section>

        <!-- 匯出按鈕 -->
        <section class="panel-section">
          <h2>匯出</h2>

          <!-- 便利商店列印調暗 -->
          <section class="panel-section">
            <h2>列印調暗百分比</h2>
            <button id="exportPrint" class="btn btn-primary">匯出便利商店列印圖</button>
            <div class="slider-group">
              <label>調暗強度</label>
              <input type="range" id="exportDarkenSlider" min="0" max="5" value="5" step="1" list="exportDarkenTicks" />
              <span class="slider-value" id="exportDarkenValue">16%</span>
            </div>
            <datalist id="exportDarkenTicks">
              <option value="0"></option>
              <option value="1"></option>
              <option value="2"></option>
              <option value="3"></option>
              <option value="4"></option>
              <option value="5"></option>
            </datalist>
          </section>


          <button id="exportSingle" class="btn btn-primary">匯出單張證件照</button>
        </section>
      </aside>

      <!-- 右側預覽區 -->
      <main class="preview-area">
        <div class="canvas-wrapper">
          <div class="canvas-container" id="canvasContainer">
            <canvas id="photoCanvas"></canvas>
            <canvas id="overlayCanvas"></canvas>
            <div class="placeholder" id="placeholder">
              <p>請先選擇照片類型，再上傳照片</p>
            </div>
          </div>
        </div>

        <!-- 底部縮放控制 -->
        <div class="zoom-controls" id="zoomControls">
          <button class="btn btn-small" id="zoomOut">−</button>
          <input type="range" id="zoomSlider" min="10" max="300" value="100" step="1" />
          <button class="btn btn-small" id="zoomIn">+</button>
          <span id="zoomValue">100%</span>
        </div>

        <!-- 單張預覽 -->
        <div class="single-preview" id="singlePreview">
          <h3>單張預覽</h3>
          <canvas id="previewCanvas"></canvas>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
